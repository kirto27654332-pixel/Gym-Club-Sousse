    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var theme = localStorage.getItem('gym-club-theme');
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta name="description" content="Gym Club Sousse - Plus de 300 cours collectifs par mois, staff qualifié, programmes personnalisés. Ouvert 7j/7, hommes et femmes. Khezema Ouest, Sousse." />
